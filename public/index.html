<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRIP VAULT</title>
  <link rel="stylesheet" href="/theme.css">
  <link id="gfont" rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@300;400;600;800&family=Rubik+Dirt&display=swap">
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--lp-accent:#ff2d55;--lp-gold:#FFD700;}
    html,body{width:100%;height:100%;overflow:hidden;}
    body{background:#080808;color:#fff;font-family:'Inter',sans-serif;}

    /* ── Background layers ──────────────────────────────────── */
    #lp-bg{
      position:fixed;inset:-30px;z-index:0;
      background-size:cover;background-position:center;
      will-change:transform;
    }
    #lp-video{
      position:fixed;inset:0;z-index:1;
      width:100%;height:100%;object-fit:cover;
      display:none;pointer-events:none;
    }
    #lp-overlay{position:fixed;inset:0;z-index:2;pointer-events:none;}
    #lp-vignette{position:fixed;inset:0;z-index:3;pointer-events:none;}
    #lp-canvas{position:fixed;inset:0;z-index:4;pointer-events:none;}
    #lp-grain{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;}
    #lp-burst{position:fixed;inset:0;z-index:80;pointer-events:none;}

    /* ── Reveal overlay ─────────────────────────────────────── */
    #lp-reveal{position:fixed;inset:0;z-index:90;pointer-events:none;display:none;}
    #lp-reveal.active{display:block;}

    /* ── Content wrapper ────────────────────────────────────── */
    #lp-wrap{
      position:fixed;inset:0;z-index:10;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:32px 20px;
    }

    /* ── Logo ───────────────────────────────────────────────── */
    #lp-logo-wrap{
      display:none;flex-direction:column;align-items:center;
      margin-bottom:24px;
      animation:lpRise 0.7s cubic-bezier(.2,0,.2,1) 0.1s both;
    }
    #lp-logo-wrap.vis{display:flex;}
    #lp-logo-img{
      object-fit:contain;
      filter:drop-shadow(0 2px 16px rgba(0,0,0,0.5));
      transition:filter 0.55s ease,transform 0.3s;
    }
    #lp-logo-img.lp-logo-glow{
      filter:drop-shadow(0 0 20px var(--lp-accent))
             drop-shadow(0 0 50px var(--lp-accent))!important;
      animation:none!important;
    }
    @keyframes logoPulse {0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
    @keyframes logoBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes logoFade  {0%,100%{opacity:1}50%{opacity:0.38}}
    @keyframes logoRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    /* ── Headline ───────────────────────────────────────────── */
    .lp-headline-wrap{
      text-align:center;margin-bottom:40px;
      animation:lpRise 0.7s cubic-bezier(.2,0,.2,1) 0.25s both;
    }
    .lp-headline{
      font-family:'Bangers',cursive;
      font-size:clamp(52px,9vw,96px);
      letter-spacing:5px;line-height:1;
      text-transform:uppercase;color:#fff;
      text-shadow:0 3px 0 rgba(0,0,0,0.35),0 0 0px transparent;
      transition:text-shadow 0.6s ease,filter 0.4s;
      position:relative;display:inline-block;
    }
    .lp-headline.success-glow{
      text-shadow:0 3px 0 rgba(0,0,0,0.35),
                  0 0 50px var(--lp-accent),0 0 100px var(--lp-accent);
      filter:brightness(1.15);
    }
    .lp-subtitle{
      margin-top:10px;font-size:12px;font-weight:500;
      color:rgba(255,255,255,0.3);
      letter-spacing:0.25em;text-transform:uppercase;
    }

    /* ── Headline entry animations ──────────────────────────── */
    .hl-anim-fade {animation:hlFade  0.9s ease both;}
    .hl-anim-slide{animation:hlSlide 0.7s cubic-bezier(.2,0,.2,1) both;}
    @keyframes hlFade {from{opacity:0}to{opacity:1}}
    @keyframes hlSlide{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}
    .hl-anim-glitch{animation:hlGlitch 0.6s steps(7) both;}
    @keyframes hlGlitch{
      0%{opacity:0;transform:translateX(-6px)skewX(-4deg);}
      20%{opacity:1;transform:translateX(4px)skewX(2deg);}
      40%{opacity:0.6;transform:translateX(-3px);}
      70%{opacity:1;transform:translateX(1px);}
      100%{opacity:1;transform:translateX(0)skewX(0);}
    }
    /* Glitch decorative clones */
    .hl-glitch::before,.hl-glitch::after{
      content:attr(data-text);position:absolute;top:0;left:0;
      width:100%;height:100%;font:inherit;color:inherit;pointer-events:none;
    }
    .hl-glitch::before{
      color:#0ff;clip-path:polygon(0 15%,100% 15%,100% 38%,0 38%);
      animation:glR 2.5s infinite;
    }
    .hl-glitch::after{
      color:#f0f;clip-path:polygon(0 60%,100% 60%,100% 82%,0 82%);
      animation:glB 3.1s infinite;
    }
    @keyframes glR{0%,90%,100%{transform:translateX(0)}91%{transform:translateX(-4px)}95%{transform:translateX(3px)}}
    @keyframes glB{0%,85%,100%{transform:translateX(0)}86%{transform:translateX(4px)} 92%{transform:translateX(-3px)}}

    /* ── Form ───────────────────────────────────────────────── */
    #lp-form-wrap{
      width:100%;max-width:390px;
      display:flex;flex-direction:column;align-items:center;gap:14px;
      animation:lpRise 0.7s cubic-bezier(.2,0,.2,1) 0.4s both;
      transition:transform 0.65s cubic-bezier(.4,0,.2,1),opacity 0.5s ease;
    }
    #lp-form-wrap.lp-exit{
      transform:translateY(-60px)scale(0.93);
      opacity:0;pointer-events:none;
    }

    /* ── Input ──────────────────────────────────────────────── */
    .lp-input-outer{position:relative;width:100%;}
    .lp-input{
      width:100%;padding:17px 22px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.11);
      border-radius:14px;color:#fff;
      font-size:15px;font-family:'Inter',sans-serif;
      font-weight:500;letter-spacing:0.05em;
      outline:none;-webkit-appearance:none;
      transition:border-color 0.22s,box-shadow 0.25s,transform 0.22s;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .lp-input::placeholder{color:rgba(255,255,255,0.22);}
    .lp-input:focus{
      border-color:var(--lp-accent);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--lp-accent) 22%,transparent),
                 0 0 24px color-mix(in srgb,var(--lp-accent) 14%,transparent);
      transform:scale(1.013);
    }
    .lp-input.shake{
      animation:lpShake 0.48s cubic-bezier(.36,.07,.19,.97) both;
      border-color:#ff3b30!important;
      box-shadow:0 0 0 3px rgba(255,59,48,0.22)!important;
    }
    @keyframes lpShake{
      0%,100%{transform:translateX(0)scale(1.013);}
      14%{transform:translateX(-7px)scale(1.013);}
      28%{transform:translateX(6px) scale(1.013);}
      42%{transform:translateX(-5px)scale(1.013);}
      57%{transform:translateX(4px) scale(1.013);}
      71%{transform:translateX(-2px)scale(1.013);}
      85%{transform:translateX(1px) scale(1.013);}
    }

    /* ── Button ─────────────────────────────────────────────── */
    .lp-btn{
      width:100%;padding:17px 24px;border:none;
      border-radius:12px;background:var(--lp-accent);color:#fff;
      font-family:'Inter',sans-serif;font-size:13px;
      font-weight:800;letter-spacing:0.18em;text-transform:uppercase;
      cursor:pointer;position:relative;overflow:hidden;
      transition:transform 0.15s ease,box-shadow 0.2s,background 0.2s,filter 0.2s;
      box-shadow:0 4px 24px -4px rgba(255,45,85,0.5);
    }
    .lp-btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.16)0%,transparent 55%);
      opacity:0;transition:opacity 0.2s;
    }
    .lp-btn::after{
      content:'';position:absolute;
      top:-50%;left:-75%;width:50%;height:200%;
      background:rgba(255,255,255,0.14);
      transform:skewX(-20deg)translateX(-200%);
    }
    .lp-btn:hover{transform:translateY(-2px);filter:brightness(1.09);}
    .lp-btn:hover::before{opacity:1;}
    .lp-btn:hover::after{animation:btnShine 0.45s ease forwards;}
    .lp-btn:active{transform:translateY(0);filter:brightness(0.94);}
    .lp-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;filter:none;}
    @keyframes btnShine{
      from{transform:skewX(-20deg)translateX(-200%);}
      to  {transform:skewX(-20deg)translateX(500%);}
    }
    .btn-anim-pulse{animation:lpBtnPulse 2s ease-in-out infinite;}
    @keyframes lpBtnPulse{
      0%,100%{box-shadow:0 4px 24px -4px rgba(255,45,85,0.5);transform:scale(1);}
      50%    {box-shadow:0 4px 42px  0px rgba(255,45,85,0.85);transform:scale(1.02);}
    }
    .btn-anim-glow{animation:lpBtnGlow 1.8s ease-in-out infinite;}
    @keyframes lpBtnGlow{
      0%,100%{box-shadow:0 0 12px rgba(255,45,85,0.3),0 4px 24px -4px rgba(255,45,85,0.5);}
      50%    {box-shadow:0 0 36px rgba(255,45,85,0.8),0 0 72px rgba(255,45,85,0.32),0 4px 28px -4px rgba(255,45,85,0.7);}
    }

    /* ── Hint + Error ────────────────────────────────────────── */
    .lp-hint{font-size:11px;color:rgba(255,255,255,0.22);letter-spacing:0.08em;text-align:center;}
    .lp-error{
      font-size:13px;color:#ff453a;text-align:center;
      min-height:18px;opacity:0;
      transform:translateY(-5px);
      transition:opacity 0.22s,transform 0.22s;
    }
    .lp-error.vis{opacity:1;transform:translateY(0);}

    /* ── Content entrance ────────────────────────────────────── */
    @keyframes lpRise{
      from{opacity:0;transform:translateY(20px);}
      to  {opacity:1;transform:translateY(0);}
    }

    /* ── Page exit ───────────────────────────────────────────── */
    body.lp-out{animation:lpOut 0.58s ease forwards;}
    @keyframes lpOut{from{opacity:1}to{opacity:0}}

    /* ══════════════════════════════════════════════════════════
       REVEAL ANIMATIONS
    ══════════════════════════════════════════════════════════ */

    /* Fade (default) */
    .rev-fade #lp-wrap{animation:lpRevFade 0.9s ease both;}
    @keyframes lpRevFade{from{opacity:0}to{opacity:1}}

    /* Zoom */
    .rev-zoom #lp-wrap{animation:lpRevZoom 0.85s cubic-bezier(.2,0,.2,1) both;}
    @keyframes lpRevZoom{from{opacity:0;transform:scale(1.1)}to{opacity:1;transform:scale(1)}}

    /* Slide */
    .rev-slide #lp-wrap{animation:lpRevSlide 0.8s cubic-bezier(.2,0,.2,1) both;}
    @keyframes lpRevSlide{from{opacity:0;transform:translateY(52px)}to{opacity:1;transform:translateY(0)}}

    /* Glitch */
    .rev-glitch #lp-wrap{animation:lpRevGlitch 0.7s steps(8) both;}
    @keyframes lpRevGlitch{
      0%  {opacity:0;transform:translateX(-8px)skewX(-5deg);clip-path:inset(70% 0 0 0);}
      25% {opacity:0.8;transform:translateX(5px);clip-path:inset(30% 0 20% 0);}
      50% {opacity:0.5;transform:translateX(-3px);clip-path:inset(0 0 50% 0);}
      75% {opacity:0.9;transform:translateX(2px);clip-path:inset(0 0 5% 0);}
      100%{opacity:1;transform:translateX(0)skewX(0);clip-path:none;}
    }

    /* Neon */
    .rev-neon #lp-wrap   {animation:lpRevFadeQ 0.4s ease both;}
    .rev-neon .lp-headline{animation:lpNeonFlicker 1.4s ease both;}
    @keyframes lpRevFadeQ{from{opacity:0}to{opacity:1}}
    @keyframes lpNeonFlicker{
      0% {opacity:0;text-shadow:none;}
      10%{opacity:1;text-shadow:0 0 30px var(--lp-accent),0 0 60px var(--lp-accent);}
      18%{opacity:0.2;text-shadow:none;}
      30%{opacity:1;text-shadow:0 0 40px var(--lp-accent),0 0 80px var(--lp-accent);}
      40%{opacity:0.6;text-shadow:0 0 15px var(--lp-accent);}
      58%{opacity:1;text-shadow:0 0 20px color-mix(in srgb,var(--lp-accent) 50%,transparent);}
      100%{opacity:1;text-shadow:0 3px 0 rgba(0,0,0,0.35);}
    }

    /* Chrome */
    .rev-chrome #lp-reveal{
      background:linear-gradient(105deg,
        transparent 0%,rgba(255,255,255,0.04)38%,
        rgba(255,255,255,0.96)50%,rgba(255,255,255,0.04)62%,transparent 100%);
      background-size:260% 100%;
      animation:lpChromeSweep 0.85s ease forwards;
    }
    @keyframes lpChromeSweep{
      from{background-position:-80% 0;opacity:1;}
      to  {background-position:185% 0;opacity:0;}
    }
    .rev-chrome #lp-wrap{animation:lpRevFade 0.65s ease 0.2s both;}

    /* Graffiti */
    .rev-graffiti #lp-reveal{
      background:#060606;
      animation:lpGraffitiWipe 0.75s cubic-bezier(.7,0,.3,1) 0.05s forwards;
    }
    @keyframes lpGraffitiWipe{
      from{clip-path:inset(0 0 0 0);}
      to  {clip-path:inset(0 100% 0 0);}
    }
    .rev-graffiti #lp-wrap{animation:lpRevFade 0.5s ease 0.38s both;}

    /* Money */
    .rev-money #lp-reveal{
      background:#060606;
      animation:lpMoneyReveal 1.1s ease forwards;
    }
    @keyframes lpMoneyReveal{0%{opacity:1}65%{opacity:1}100%{opacity:0}}
    .rev-money #lp-reveal::after{
      content:'$ $ $ $ $ $ $ $ $';
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      font-family:'Bangers',cursive;
      font-size:clamp(40px,7vw,72px);
      letter-spacing:18px;color:rgba(255,215,0,0.5);
      animation:lpMoneyText 1.1s ease both;
    }
    @keyframes lpMoneyText{
      0%  {opacity:0;transform:scale(0.85);}
      30% {opacity:1;transform:scale(1.04);}
      75% {opacity:1;transform:scale(1);}
      100%{opacity:0;transform:scale(1.08);}
    }
    .rev-money #lp-wrap{animation:lpRevFade 0.6s ease 0.55s both;}
  </style>
</head>
<body>
  <div id="lp-bg"></div>
  <video id="lp-video" autoplay muted loop playsinline></video>
  <div id="lp-overlay"></div>
  <div id="lp-vignette"></div>
  <canvas id="lp-canvas"></canvas>
  <canvas id="lp-grain"></canvas>
  <div id="lp-reveal"></div>
  <canvas id="lp-burst"></canvas>

  <div id="lp-wrap">
    <div id="lp-logo-wrap">
      <img id="lp-logo-img" src="" alt="">
    </div>
    <div class="lp-headline-wrap">
      <h1 id="lp-headline" class="lp-headline" data-text="DRIP VAULT">DRIP VAULT</h1>
      <p  id="lp-subtitle" class="lp-subtitle"></p>
    </div>
    <div id="lp-form-wrap">
      <div class="lp-input-outer">
        <input type="password" id="lp-input" class="lp-input"
          placeholder="Zugangscode eingeben" autocomplete="off" spellcheck="false">
      </div>
      <button id="lp-btn" class="lp-btn" type="button">EINTRETEN</button>
      <p id="lp-hint"  class="lp-hint"></p>
      <p id="lp-error" class="lp-error"></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
  'use strict';

  /* ── Redirect if already logged in ─────────────────────── */
  (function(){
    const r = Auth.getRole();
    if (r === 'admin')    location.replace('/admin.html');
    if (r === 'customer') location.replace('/shop.html');
  })();

  /* ── Globals ────────────────────────────────────────────── */
  let LP  = {};
  let RAF = { money: null, grain: null, burst: null };
  let bills = [], golds = [], dsigns = [], smokes = [];
  let bursts = [];

  const cvs = document.getElementById('lp-canvas');
  const bvs = document.getElementById('lp-burst');
  const grn = document.getElementById('lp-grain');
  const cx  = cvs.getContext('2d');
  const bx  = bvs.getContext('2d');
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function resize() {
    cvs.width = bvs.width = grn.width  = innerWidth;
    cvs.height= bvs.height= grn.height = innerHeight;
  }
  resize();
  addEventListener('resize', () => { resize(); stopMoney(); initMoney(LP.money || {}); });

  /* ══════════════════════════════════════════════════════════
     APPLY SETTINGS
  ══════════════════════════════════════════════════════════ */
  async function applySettings() {
    const s  = await fetch('/settings').then(r => r.json()).catch(() => ({}));
    const t  = s.theme    || {};
    LP       = s.loginPage || {};

    const accent = LP.btnBg || t.accentColor || '#ff2d55';
    document.documentElement.style.setProperty('--lp-accent', accent);

    /* ── Background color ─────────────────────────────────── */
    document.body.style.background = LP.bgColor || t.bgColor || '#080808';

    /* ── BG image ─────────────────────────────────────────── */
    const bgImg  = LP.bgImage || s.loginBackground || '';
    const blur   = parseFloat(LP.bgBlur       || 0);
    const bright = parseFloat(LP.bgBrightness || 1);
    const bgEl   = document.getElementById('lp-bg');
    if (bgImg) {
      bgEl.style.backgroundImage = `url(${bgImg})`;
      bgEl.style.backgroundSize  = 'cover';
      bgEl.style.backgroundPosition = 'center';
    }
    bgEl.style.filter = `blur(${blur}px) brightness(${bright})`;

    /* ── BG video ─────────────────────────────────────────── */
    if (LP.bgVideo) {
      const vid = document.getElementById('lp-video');
      vid.src   = LP.bgVideo;
      vid.style.display = 'block';
      vid.style.filter  = `blur(${blur}px) brightness(${bright})`;
    }

    /* ── Color overlay ────────────────────────────────────── */
    const op = parseFloat(LP.bgOverlay ?? 0.5);
    document.getElementById('lp-overlay').style.cssText =
      `position:fixed;inset:0;z-index:2;pointer-events:none;background:rgba(0,0,0,${op});`;

    /* ── Vignette ─────────────────────────────────────────── */
    const vig = parseFloat(LP.vignette ?? 0.6);
    document.getElementById('lp-vignette').style.cssText =
      `position:fixed;inset:0;z-index:3;pointer-events:none;` +
      (vig > 0
        ? `background:radial-gradient(ellipse at center,transparent 18%,rgba(0,0,0,${vig}) 100%);`
        : '');

    /* ── Logo ─────────────────────────────────────────────── */
    if (LP.logoUrl) {
      const wrap = document.getElementById('lp-logo-wrap');
      const img  = document.getElementById('lp-logo-img');
      wrap.classList.add('vis');
      img.src = LP.logoUrl;
      const sz = LP.logoSize || 72;
      img.style.width = sz + 'px'; img.style.height = sz + 'px';
      const anims = {
        pulse:  'logoPulse  2s ease-in-out infinite',
        bounce: 'logoBounce 1.6s ease-in-out infinite',
        fade:   'logoFade   3s ease-in-out infinite',
        rotate: 'logoRotate 6s linear infinite',
      };
      if (anims[LP.logoAnim]) img.style.animation = anims[LP.logoAnim];
    }

    /* ── Headline ─────────────────────────────────────────── */
    const hl   = document.getElementById('lp-headline');
    const font = LP.headlineFont || s.fontDisplay || 'Bangers';
    hl.textContent  = LP.headline || s.shopTitle || 'DRIP VAULT';
    hl.dataset.text = hl.textContent;
    hl.style.fontFamily = `"${font}", cursive, sans-serif`;
    hl.style.color      = LP.headlineColor || '#ffffff';
    hl.style.fontSize   = (LP.headlineSize || 72) + 'px';

    if (!['Bangers','Inter','Rubik Dirt'].includes(font)) {
      const lk = document.createElement('link');
      lk.rel = 'stylesheet';
      lk.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font).replace(/%20/g,'+')}&display=swap`;
      document.head.appendChild(lk);
    }

    const ha = LP.headlineAnim || 'none';
    if (ha !== 'none')    hl.classList.add('hl-anim-' + ha);
    if (ha === 'glitch')  hl.classList.add('hl-glitch');

    /* ── Subtitle ─────────────────────────────────────────── */
    const sub = document.getElementById('lp-subtitle');
    sub.textContent    = LP.subtitle || '';
    sub.style.color    = LP.subtitleColor || 'rgba(255,255,255,0.3)';
    sub.style.fontSize = (LP.subtitleSize || 12) + 'px';

    /* ── Hint ─────────────────────────────────────────────── */
    const hint = document.getElementById('lp-hint');
    if (LP.hintText) {
      hint.textContent    = LP.hintText;
      hint.style.color    = LP.hintColor    || 'rgba(255,255,255,0.22)';
      hint.style.fontSize = (LP.hintSize    || 11) + 'px';
    }

    /* ── Dynamic CSS ──────────────────────────────────────── */
    buildDynCSS(LP, accent);

    /* ── Input placeholder ────────────────────────────────── */
    document.getElementById('lp-input').placeholder = LP.inputPlaceholder || 'Zugangscode eingeben';

    /* ── Button text ──────────────────────────────────────── */
    const icon = LP.btnIcon ? LP.btnIcon + ' ' : '';
    document.getElementById('lp-btn').textContent = icon + (LP.btnText || 'EINTRETEN');

    /* ── Camera parallax ──────────────────────────────────── */
    if (LP.cameraMove) {
      addEventListener('mousemove', onParallax);
    }

    /* ── Page reveal ──────────────────────────────────────── */
    const rev = LP.pageReveal || 'fade';
    applyReveal(rev);

    /* ── Money atmosphere ─────────────────────────────────── */
    const money = LP.money || {};
    if (money.enabled !== false) {
      stopMoney();
      initMoney(money);
    }

    /* ── Film grain ───────────────────────────────────────── */
    const gr = LP.grain || {};
    if (gr.enabled) initGrain(parseFloat(gr.intensity || 0.35));
  }

  /* ── Dynamic CSS builder ────────────────────────────────── */
  function buildDynCSS(lp, accent) {
    const ig     = lp.inputGlow  || accent;
    const iRad   = (lp.inputRadius  || 14) + 'px';
    const bRad   = (lp.btnRadius    || 12) + 'px';
    const bBg    = lp.btnBg    || accent;
    const bCol   = lp.btnColor || '#fff';
    const bHov   = lp.btnHoverBg    || '';
    const bGlow  = lp.btnGlow  ? (lp.btnGlowColor || accent) : null;
    const iShdw  = lp.inputShadow
      ? '0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06)'
      : 'none';

    const old = document.getElementById('lp-dyn');
    if (old) old.remove();
    const st = document.createElement('style');
    st.id = 'lp-dyn';
    st.textContent = `
      .lp-input{
        background:${lp.inputBg || 'rgba(255,255,255,0.07)'};
        border:1px solid ${lp.inputBorder || 'rgba(255,255,255,0.11)'};
        color:${lp.inputTextColor || '#fff'};
        border-radius:${iRad};
        box-shadow:${iShdw};
      }
      .lp-input:focus{
        border-color:${ig}!important;
        box-shadow:0 0 0 3px ${ig}30,0 0 24px ${ig}18!important;
        transform:scale(1.013)!important;
      }
      .lp-btn{
        background:${bBg};
        color:${bCol};
        border-radius:${bRad};
        ${bGlow ? `box-shadow:0 4px 28px -4px ${bGlow}90,0 0 48px ${bGlow}28;` : ''}
      }
      ${bHov ? `.lp-btn:hover{background:${bHov};}` : ''}
      ${bGlow ? `
        .lp-btn{animation:dynBg 2s ease-in-out infinite!important;}
        @keyframes dynBg{
          0%,100%{box-shadow:0 4px 28px -4px ${bGlow}90;}
          50%{box-shadow:0 4px 48px 2px ${bGlow}d0,0 0 72px ${bGlow}48;}
        }
      ` : ''}
      ${lp.btnAnim === 'pulse' ? '.lp-btn{animation:lpBtnPulse 2s ease-in-out infinite!important;}' : ''}
      ${lp.btnAnim === 'glow'  ? '.lp-btn{animation:lpBtnGlow  1.8s ease-in-out infinite!important;}' : ''}
    `;
    document.head.appendChild(st);
  }

  /* ── Camera parallax ────────────────────────────────────── */
  function onParallax(e) {
    const mx = (e.clientX / innerWidth  - 0.5) * 14;
    const my = (e.clientY / innerHeight - 0.5) * 10;
    const bg = document.getElementById('lp-bg');
    const vid= document.getElementById('lp-video');
    bg.style.transform = `translate(${mx}px,${my}px)`;
    if (LP.bgVideo) vid.style.transform = `translate(${mx}px,${my}px)`;
  }

  /* ── Reveal ─────────────────────────────────────────────── */
  function applyReveal(type) {
    document.body.classList.add('rev-' + type);
    if (['chrome','graffiti','money'].includes(type)) {
      document.getElementById('lp-reveal').classList.add('active');
    }
  }

  /* ══════════════════════════════════════════════════════════
     MONEY CANVAS EFFECT
  ══════════════════════════════════════════════════════════ */
  function initMoney(cfg) {
    const W   = cvs.width, H = cvs.height;
    const cnt = Math.min(parseInt(cfg.count || 12), 30);
    const spd = parseFloat(cfg.speed   || 0.6);
    const szM = parseFloat(cfg.size    || 1.0);
    const mOp = Math.min(parseFloat(cfg.opacity || 0.22), 1);

    bills  = Array.from({length: cnt},            (_, i) => mkBill(W,H,spd,szM,mOp,i/cnt));
    golds  = Array.from({length: cnt * 3},        ()     => mkGold(W,H,spd,mOp));
    dsigns = Array.from({length: Math.max(1,cnt>>1)}, () => mkDollar(W,H,spd,mOp));
    smokes = Array.from({length: 4},              ()     => mkSmoke(W,H));

    RAF.money = requestAnimationFrame(moneyLoop);
  }

  function stopMoney() {
    if (RAF.money) cancelAnimationFrame(RAF.money), RAF.money = null;
    bills = []; golds = []; dsigns = []; smokes = [];
    cx.clearRect(0, 0, cvs.width, cvs.height);
  }

  function mkBill(W, H, spd, szM, mOp, phase) {
    const bw = (52 + Math.random() * 44) * szM;
    return {
      x: Math.random() * W,
      y: phase != null ? -phase * H * 1.5 : -50 - Math.random() * H * 0.7,
      w: bw, h: bw * 0.43,
      rot: (Math.random() - 0.5) * 48,
      rotV:(Math.random() - 0.5) * 0.36,
      vy: (0.28 + Math.random() * 0.58) * spd,
      vx: (Math.random() - 0.5) * 0.35 * spd,
      swA: 10 + Math.random() * 24,
      swF: 0.0024 + Math.random() * 0.003,
      swP: Math.random() * Math.PI * 2,
      op:  Math.min((0.07 + Math.random() * 0.18) * (mOp * 4.5), 0.98),
    };
  }

  function mkGold(W, H, spd, mOp) {
    return {
      x: Math.random() * W, y: H + Math.random() * 280,
      r: 0.8 + Math.random() * 2.4,
      vy: -(0.22 + Math.random() * 0.56) * spd,
      vx: (Math.random() - 0.5) * 0.48,
      life: 1, dc: 0.003 + Math.random() * 0.005,
      maxOp: (0.3 + Math.random() * 0.7) * Math.min(mOp * 3.8, 1),
    };
  }

  function mkDollar(W, H, spd, mOp) {
    return {
      x: Math.random() * W, y: H + 60 + Math.random() * 200,
      sz: 13 + Math.random() * 18,
      vy: -(0.18 + Math.random() * 0.4) * spd,
      vx: (Math.random() - 0.5) * 0.25,
      life: 1, dc: 0.0012 + Math.random() * 0.0018,
      maxOp: (0.17 + Math.random() * 0.28) * Math.min(mOp * 4.2, 1),
    };
  }

  function mkSmoke(W, H) {
    return {
      x: Math.random() * W, y: H * 0.25 + Math.random() * H * 0.55,
      r: 85 + Math.random() * 140,
      vx: (Math.random() - 0.5) * 0.12,
      vy: -0.04 - Math.random() * 0.08,
      life: 0.5 + Math.random() * 0.5, dc: 0.0004,
    };
  }

  function drawBill(b, now) {
    const sw = b.swA * Math.sin(now * b.swF + b.swP);
    cx.save();
    cx.translate(b.x + sw, b.y);
    cx.rotate(b.rot * Math.PI / 180);
    cx.globalAlpha = Math.min(b.op, 1);

    const w = b.w, h = b.h, r = 5;
    cx.beginPath();
    cx.moveTo(-w/2+r,-h/2); cx.lineTo(w/2-r,-h/2);
    cx.arcTo( w/2,-h/2, w/2,-h/2+r,r);
    cx.lineTo( w/2, h/2-r); cx.arcTo( w/2, h/2, w/2-r, h/2,r);
    cx.lineTo(-w/2+r, h/2); cx.arcTo(-w/2, h/2,-w/2, h/2-r,r);
    cx.lineTo(-w/2,-h/2+r); cx.arcTo(-w/2,-h/2,-w/2+r,-h/2,r);
    cx.closePath();

    const g = cx.createLinearGradient(-w/2,-h/2, w/2, h/2);
    g.addColorStop(0,   '#295922');
    g.addColorStop(0.5, '#357a2b');
    g.addColorStop(1,   '#1b3d17');
    cx.fillStyle = g;
    cx.fill();

    cx.strokeStyle = 'rgba(0,0,0,0.4)';
    cx.lineWidth   = 1.5;
    cx.stroke();

    cx.strokeStyle = 'rgba(255,255,255,0.09)';
    cx.lineWidth   = 0.5;
    const p = 5;
    cx.strokeRect(-w/2+p,-h/2+p, w-p*2, h-p*2);

    cx.fillStyle    = 'rgba(255,215,0,0.88)';
    cx.font         = `bold ${Math.round(h*0.58)}px Inter,sans-serif`;
    cx.textAlign    = 'center';
    cx.textBaseline = 'middle';
    cx.shadowColor  = 'rgba(255,215,0,0.5)';
    cx.shadowBlur   = h * 0.35;
    cx.fillText('$', 0, 0);
    cx.shadowBlur   = 0;

    cx.strokeStyle = 'rgba(255,255,255,0.06)';
    cx.lineWidth   = 0.6;
    for (let i = 0; i < 3; i++) {
      const lx = w/2 - 11 - i * 5;
      cx.beginPath(); cx.moveTo(lx,-h/2+6); cx.lineTo(lx,h/2-6); cx.stroke();
    }
    cx.restore();
  }

  function moneyLoop() {
    const W = cvs.width, H = cvs.height;
    const now = performance.now() * 0.001;
    cx.clearRect(0, 0, W, H);

    /* light blobs */
    smokes.forEach(s => {
      const g = cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
      g.addColorStop(0,  `rgba(160,120,40,${s.life*0.026})`);
      g.addColorStop(0.6,`rgba(90,65,18,${s.life*0.011})`);
      g.addColorStop(1,  'transparent');
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill();
      s.x+=s.vx; s.y+=s.vy; s.life-=s.dc;
      if (s.life<=0) Object.assign(s, mkSmoke(W,H));
    });

    /* gold sparkles */
    golds.forEach((p,i) => {
      cx.save();
      cx.globalAlpha = p.life * p.maxOp;
      cx.strokeStyle = '#FFD700'; cx.lineWidth = p.r;
      cx.lineCap = 'round'; cx.shadowColor = '#FFD700'; cx.shadowBlur = p.r * 5;
      cx.beginPath();
      cx.moveTo(p.x-p.r*2.4,p.y); cx.lineTo(p.x+p.r*2.4,p.y);
      cx.moveTo(p.x,p.y-p.r*2.4); cx.lineTo(p.x,p.y+p.r*2.4);
      cx.stroke();
      cx.restore();
      p.x+=p.vx; p.y+=p.vy; p.life-=p.dc;
      if (p.life<=0) golds[i] = mkGold(W,H,LP.money?.speed||0.6,LP.money?.opacity||0.22);
    });

    /* dollar signs */
    dsigns.forEach((d,i) => {
      cx.save();
      cx.globalAlpha = d.life * d.maxOp;
      cx.fillStyle   = '#FFD700';
      cx.font        = `800 ${d.sz}px Bangers,cursive`;
      cx.textAlign   = 'center'; cx.textBaseline = 'middle';
      cx.shadowColor = '#FFD700'; cx.shadowBlur = d.sz * 0.75;
      cx.fillText('$', d.x, d.y);
      cx.restore();
      d.x+=d.vx; d.y+=d.vy; d.life-=d.dc;
      if (d.life<=0) dsigns[i] = mkDollar(W,H,LP.money?.speed||0.6,LP.money?.opacity||0.22);
    });

    /* bills */
    bills.forEach((b,i) => {
      drawBill(b, now);
      b.rot+=b.rotV; b.x+=b.vx; b.y+=b.vy;
      if (b.y > H + 130) {
        bills[i] = mkBill(W,H,LP.money?.speed||0.6,LP.money?.size||1,LP.money?.opacity||0.22,null);
        bills[i].y = -60 - Math.random()*100;
      }
    });

    RAF.money = requestAnimationFrame(moneyLoop);
  }

  /* ── Film grain ─────────────────────────────────────────── */
  function initGrain(intensity) {
    grn.style.opacity = Math.min(intensity, 1);
    if (RAF.grain) cancelAnimationFrame(RAF.grain);
    let f = 0;
    const gx = grn.getContext('2d');
    function tick() {
      f++;
      if (f % 2 === 0) { RAF.grain = requestAnimationFrame(tick); return; }
      const W = grn.width, H = grn.height;
      const img = gx.createImageData(W, H);
      const d   = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = (Math.random() * 255)|0;
        d[i]=d[i+1]=d[i+2]=v; d[i+3]=20;
      }
      gx.putImageData(img, 0, 0);
      RAF.grain = requestAnimationFrame(tick);
    }
    RAF.grain = requestAnimationFrame(tick);
  }

  /* ══════════════════════════════════════════════════════════
     SUCCESS SEQUENCE
  ══════════════════════════════════════════════════════════ */
  async function onSuccess(role) {
    const accent = getComputedStyle(document.documentElement)
                    .getPropertyValue('--lp-accent').trim() || '#ff2d55';

    document.getElementById('lp-logo-img')?.classList.add('lp-logo-glow');
    document.getElementById('lp-headline').classList.add('success-glow');

    spawnBurst(accent);

    await sleep(100);
    document.getElementById('lp-form-wrap').classList.add('lp-exit');

    await sleep(700);
    document.body.classList.add('lp-out');

    await sleep(600);
    location.replace(role === 'admin' ? '/admin.html' : '/shop.html');
  }

  function spawnBurst(accent) {
    bursts = [];
    const cx2 = bvs.width/2, cy2 = bvs.height/2;
    for (let i = 0; i < 75; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 3 + Math.random() * 11;
      bursts.push({
        x: cx2, y: cy2,
        vx: Math.cos(a)*s, vy: Math.sin(a)*s - 3.5,
        life: 1, dc: 0.016 + Math.random() * 0.024,
        r: 2 + Math.random() * 6,
        col: Math.random() > 0.35 ? accent : '#FFD700',
        type: Math.random() > 0.5 ? 'dot' : '$',
      });
    }
    burstLoop();
  }

  function burstLoop() {
    bx.clearRect(0, 0, bvs.width, bvs.height);
    bursts = bursts.filter(p => p.life > 0.02);
    if (!bursts.length) return;

    bursts.forEach(p => {
      bx.save();
      bx.globalAlpha = p.life * 0.9;
      if (p.type === '$') {
        bx.fillStyle   = '#FFD700';
        bx.shadowColor = '#FFD700'; bx.shadowBlur = 14;
        bx.font        = `bold ${Math.round(p.r*3.2)}px Bangers,cursive`;
        bx.textAlign   = 'center'; bx.textBaseline = 'middle';
        bx.fillText('$', p.x, p.y);
      } else {
        bx.fillStyle   = p.col;
        bx.shadowColor = p.col; bx.shadowBlur = p.r * 3.5;
        bx.beginPath(); bx.arc(p.x, p.y, Math.max(p.r*p.life,0.5), 0, Math.PI*2); bx.fill();
      }
      bx.restore();
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.vx*=0.97; p.life-=p.dc;
    });

    RAF.burst = requestAnimationFrame(burstLoop);
  }

  /* ══════════════════════════════════════════════════════════
     ERROR ANIMATION
  ══════════════════════════════════════════════════════════ */
  function showError(msg) {
    const inp = document.getElementById('lp-input');
    const err = document.getElementById('lp-error');
    inp.classList.remove('shake');
    void inp.offsetWidth; /* reflow */
    inp.classList.add('shake');
    err.textContent = msg || LP.errorText || 'Falscher Code. Versuch es nochmal.';
    err.classList.add('vis');
    setTimeout(() => inp.classList.remove('shake'), 550);
    setTimeout(() => err.classList.remove('vis'),   3200);
  }

  /* ══════════════════════════════════════════════════════════
     LOGIN
  ══════════════════════════════════════════════════════════ */
  async function doLogin() {
    const inp  = document.getElementById('lp-input');
    const btn  = document.getElementById('lp-btn');
    const code = inp.value.trim();
    if (!code) { inp.focus(); return; }

    const orig   = btn.textContent;
    btn.textContent = '···';
    btn.disabled    = true;

    const result = await Auth.login(code);

    if (result === 'admin' || result === 'customer') {
      await onSuccess(result);
    } else {
      showError();
      btn.textContent = orig;
      btn.disabled    = false;
      inp.value       = '';
      setTimeout(() => inp.focus(), 60);
    }
  }

  document.getElementById('lp-btn').addEventListener('click', doLogin);
  document.getElementById('lp-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  /* ── Boot ────────────────────────────────────────────────── */
  applySettings();
  </script>
</body>
