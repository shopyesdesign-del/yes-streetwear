<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kategorie wählen</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css" />
  <script src="/js/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .cat-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 100%);
    }
    .cat-logo {
      font-family: 'Bangers', cursive;
      font-size: 1.6rem;
      letter-spacing: .08em;
      color: #fff;
      text-decoration: none;
    }
    .cat-logout {
      background: none;
      border: 1px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.7);
      font-size: .75rem;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .2s;
    }
    .cat-logout:hover { border-color: #fff; color: #fff; }

    /* ── Banner grid ─────────────────────────────── */
    .cat-grid {
      display: flex;
      height: 100dvh;
    }

    .cat-banner {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .cat-banner-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #111;
      transition: transform .7s cubic-bezier(.25,.46,.45,.94);
    }
    .cat-banner:hover .cat-banner-bg { transform: scale(1.05); }

    .cat-banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, rgba(0,0,0,.2) 60%, transparent 100%);
      transition: background .4s;
    }
    .cat-banner:hover .cat-banner-overlay {
      background: linear-gradient(to top, rgba(0,0,0,.6) 0%, rgba(0,0,0,.15) 60%, transparent 100%);
    }

    .cat-divider {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,.18);
      z-index: 5;
      pointer-events: none;
    }

    .cat-banner-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 40px 36px;
      z-index: 2;
    }

    .cat-banner-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: .06em;
      line-height: 1;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0,0,0,.5);
      transition: transform .3s;
    }
    .cat-banner:hover .cat-banner-title { transform: translateY(-4px); }

    .cat-banner-subtitle {
      font-size: .95rem;
      color: rgba(255,255,255,.7);
      margin-top: 8px;
      letter-spacing: .04em;
    }

    .cat-banner-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 10px 22px;
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 30px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #fff;
      transition: all .3s;
    }
    .cat-banner:hover .cat-banner-cta {
      background: rgba(255,255,255,.15);
      border-color: #fff;
    }

    .no-hover-zoom .cat-banner:hover .cat-banner-bg { transform: none; }

    /* ── Mobile: stack vertically ────────────────── */
    @media (max-width: 640px) {
      body { overflow: auto; }
      .cat-grid { flex-direction: column; height: auto; min-height: 100dvh; }
      .cat-banner { flex: none; height: 50dvh; }
      .cat-divider { display: none; }
      .cat-banner-title { font-size: clamp(2.5rem, 12vw, 4rem); }
    }
  </style>
</head>
<body>

  <header class="cat-header">
    <a class="cat-logo" id="catLogo" href="#">DRIP VAULT</a>
    <button class="cat-logout" id="logoutBtn">Logout</button>
  </header>

  <div class="cat-grid" id="catGrid">
    <a class="cat-banner" id="banner1" href="#">
      <div class="cat-banner-bg" id="bg1"></div>
      <div class="cat-banner-overlay" id="overlay1"></div>
      <div class="cat-banner-content">
        <div class="cat-banner-title" id="title1">Fashion</div>
        <div class="cat-banner-subtitle" id="sub1"></div>
        <div class="cat-banner-cta" id="cta1">Entdecken →</div>
      </div>
    </a>

    <div class="cat-divider"></div>

    <a class="cat-banner" id="banner2" href="#">
      <div class="cat-banner-bg" id="bg2"></div>
      <div class="cat-banner-overlay" id="overlay2"></div>
      <div class="cat-banner-content">
        <div class="cat-banner-title" id="title2">Design</div>
        <div class="cat-banner-subtitle" id="sub2"></div>
        <div class="cat-banner-cta" id="cta2">Entdecken →</div>
      </div>
    </a>
  </div>

  <script>
    Auth.requireRole('customer');

    document.getElementById('logoutBtn').addEventListener('click', () => {
      Auth.logout();
      location.replace('/');
    });

    const TITLE_SIZES = {
      small:  'clamp(1.8rem, 4vw, 3rem)',
      medium: 'clamp(2.4rem, 6vw, 4.5rem)',
      large:  'clamp(3rem, 8vw, 6rem)',
      xlarge: 'clamp(4rem, 10vw, 8rem)',
    };

    async function init() {
      const s = await fetch('/settings').then(r => r.json()).catch(() => ({}));
      const cb = s.categoryBanners || {};

      if (s.shopTitle) {
        document.title = s.shopTitle + ' — Kategorie';
        document.getElementById('catLogo').textContent = s.shopTitle;
      }

      // Page-level: font
      const pageFont = cb.pageFont || 'Bangers';
      document.querySelectorAll('.cat-banner-title').forEach(el => el.style.fontFamily = `'${pageFont}', cursive, sans-serif`);

      // Page-level: layout
      if (cb.layout === 'stack') {
        const grid = document.getElementById('catGrid');
        grid.style.flexDirection = 'column';
        grid.style.height = 'auto';
        grid.style.minHeight = '100dvh';
        document.querySelectorAll('.cat-banner').forEach(b => { b.style.flex = 'none'; b.style.height = '50dvh'; });
        document.querySelector('.cat-divider').style.display = 'none';
      }

      // Page-level: hover zoom
      if (cb.hoverZoom === false) {
        document.getElementById('catGrid').classList.add('no-hover-zoom');
      }

      function applyBanner(n, b, defTitle, defSlug) {
        b = b || {};
        document.getElementById('title'+n).textContent = b.title || defTitle;
        document.getElementById('sub'+n).textContent   = b.subtitle || '';

        const cta = document.getElementById('cta'+n);
        if (cta) cta.textContent = b.ctaText || 'Entdecken →';

        const col = b.textColor || '#ffffff';
        document.getElementById('title'+n).style.color = col;
        document.getElementById('sub'+n).style.color   = col;

        const sz = TITLE_SIZES[b.titleSize] || TITLE_SIZES.large;
        document.getElementById('title'+n).style.fontSize = sz;

        const bgEl = document.getElementById('bg'+n);
        if (b.image) bgEl.style.backgroundImage = `url(${b.image})`;
        if (b.bgPosition) bgEl.style.backgroundPosition = b.bgPosition;

        const ov = (b.overlayStrength !== undefined ? b.overlayStrength : 60) / 100;
        const overlayEl = document.getElementById('overlay'+n);
        if (overlayEl) overlayEl.style.background =
          `linear-gradient(to top, rgba(0,0,0,${ov}) 0%, rgba(0,0,0,${(ov*0.3).toFixed(2)}) 55%, transparent 100%)`;

        document.getElementById('banner'+n).href = `/shop.html?cat=${encodeURIComponent(b.slug || defSlug)}`;
      }

      applyBanner(1, cb.banner1, 'Fashion', 'fashion');
      applyBanner(2, cb.banner2, 'Design',  'design');
    }

    init();
  </script>
</body>
</html>
